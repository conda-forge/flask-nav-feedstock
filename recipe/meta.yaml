{% set version = "0.6" %}
{% set sha256 = "44e40b755380a1e68ab521a2f9174de259a2c94ddcdaabf36b3aca2e110a33f4" %}

package:
  name: flask-nav
  version: '{{ version }}'

source:
  url: https://pypi.python.org/packages/source/f/flask-nav/flask-nav-{{ version }}.tar.gz
  sha256: '{{ sha256 }}'

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - flask
    - visitor
    - dominate

test:
  requires:
    - python {{ python_min }}
  imports:
    - flask_nav

about:
  home: http://github.com/mbr/flask-nav
  license: MIT
  license_family: MIT
  summary: Easily create navigation for Flask applications.

extra:
  recipe-maintainers:
    - corburn
